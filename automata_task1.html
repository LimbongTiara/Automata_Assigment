<!DOCTYPE html>
<html>
<head>
    <title>Compiler Illustrator - Mood Language by Tiara L</title>
    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            background-color: #38bdf8;
            border: none;
            color: black;
            cursor: pointer;
        }
        pre {
            text-align: left;
            background: #1e293b;
            padding: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>💬 Compiler Illustrator</h1>
<h3>Mood Language by Tiara L</h3>

<p>Masukkan kalimat seperti: <b>aku senang</b> atau <b>aku sangat sedih</b></p>

<input type="text" id="input" placeholder="aku senang">
<button onclick="check()">Check</button>

<h3 id="result"></h3>
<pre id="tree"></pre>

<hr>

<h3>📘 Context Free Grammar (CFG)</h3>
<pre>
Kalimat → Subjek Predikat
Subjek → aku
Predikat → Emosi | Intensitas Emosi
Intensitas → sangat
Emosi → senang | sedih | marah
</pre>

<script>
function check() {
    let input = document.getElementById("input").value;
    let words = input.split(" ");

    let valid = false;

    if (words.length == 2 &&
        words[0] == "aku" &&
        ["senang","sedih","marah"].includes(words[1])) {
        valid = true;

        document.getElementById("tree").innerText =
`Kalimat
|-- aku
|-- ${words[1]}`;
    }

    else if (words.length == 3 &&
        words[0] == "aku" &&
        words[1] == "sangat" &&
        ["senang","sedih","marah"].includes(words[2])) {
        valid = true;

        document.getElementById("tree").innerText =
`Kalimat
|-- aku
|-- sangat
    |-- ${words[2]}`;
    }

    if (valid) {
        document.getElementById("result").innerHTML = "✅ Valid (Parsing Success)";
    } else {
        document.getElementById("result").innerHTML =
        "❌ Tidak Valid: format harus 'aku [emosi]' atau 'aku sangat [emosi]'";
        document.getElementById("tree").innerText = "";
    }
}
</script>

</body>
</html>
