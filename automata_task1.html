<!DOCTYPE html>
<html>
<head>
    <title>Compiler Illustrator - Mood Language</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 30px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
        pre {
            background: #1e293b;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>💬 Compiler Illustrator</h1>

<h3>1. Definisi Bahasa</h3>
<textarea readonly>
Mood Language digunakan untuk mengekspresikan emosi:
- Subjek: aku
- Emosi: senang, sedih, marah
- Intensitas: sangat
- Negasi: tidak
</textarea>

<h3>2. Context Free Grammar (CFG)</h3>
<textarea readonly>
Kalimat → Subjek Predikat
Subjek → aku

Predikat → Emosi
Predikat → Intensitas Emosi
Predikat → Negasi Emosi
Predikat → Intensitas Negasi Emosi

Intensitas → sangat
Negasi → tidak

Emosi → senang | sedih | marah
</textarea>

<h3>3. Input Parser</h3>
<input type="text" id="input" placeholder="aku sangat tidak senang">
<button onclick="check()">Check</button>

<h3 id="result"></h3>
<pre id="tree"></pre>

<script>
function check() {
    let input = document.getElementById("input").value;
    let w = input.split(" ");

    let valid = false;
    let tree = "";

    if (w.length == 2 && w[0]=="aku" && isEmosi(w[1])) {
        valid = true;
        tree = `Kalimat\n|-- aku\n|-- ${w[1]}`;
    }
    else if (w.length == 3 && w[0]=="aku" && w[1]=="sangat" && isEmosi(w[2])) {
        valid = true;
        tree = `Kalimat\n|-- aku\n|-- sangat\n    |-- ${w[2]}`;
    }
    else if (w.length == 3 && w[0]=="aku" && w[1]=="tidak" && isEmosi(w[2])) {
        valid = true;
        tree = `Kalimat\n|-- aku\n|-- tidak\n    |-- ${w[2]}`;
    }
    else if (w.length == 4 && w[0]=="aku" && w[1]=="sangat" && w[2]=="tidak" && isEmosi(w[3])) {
        valid = true;
        tree = `Kalimat\n|-- aku\n|-- sangat\n    |-- tidak\n        |-- ${w[3]}`;
    }

    if (valid) {
        document.getElementById("result").innerHTML = "✅ Valid (Parsing Success)";
        document.getElementById("tree").innerText = tree;
    } else {
        document.getElementById("result").innerHTML =
        "❌ Tidak Valid (Parsing Error)";
        document.getElementById("tree").innerText = "";
    }
}

function isEmosi(word){
    return ["senang","sedih","marah"].includes(word);
}
</script>

</body>
</html>
